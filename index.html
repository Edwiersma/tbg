<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>tbtg</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1e1e1e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Consolas, "Courier New", monospace;
    }

    .window {
      width: 50%;
      max-width: 95%;
      min-width: 720px;
      max-height: 720px;
      background-color: #0c0c0c;
      border-radius: 6px;
      box-shadow: 0 0 24px rgba(0,0,0,0.7);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .titlebar {
      background: #2d2d2d;
      padding: 7px 12px;
      font-size: 0.85rem;
      color: #aaa;
      border-bottom: 1px solid #111;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #output {
      padding: 14px 16px;
      color: #fee;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
      font-size: 0.9rem;
      overflow-y: auto;
      max-height: 620px;
      flex: 1;
    }

    .line     { display: block; }
    .line.cmd { color: #8fc; }
    .line.err { color: #f88; }
    .line.dim { color: #888; }

    #input-row {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      border-top: 1px solid #111;
      background: #111;
      flex-shrink: 0;
    }

    #prompt-label {
      color: #8fc;
      white-space: nowrap;
      margin-right: 6px;
      font-size: 0.9rem;
    }

    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fee;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.9rem;
      caret-color: #fee;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span id="titlebar-label" style="margin-left:4px;">TBTG</span>
    </div>
    <div id="output"></div>
    <div id="input-row">
      <span id="prompt-label">&gt;</span>
      <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" />
    </div>
  </div>

  <!-- Loading bar module — no other dependency -->
  <script src="loadingbar.js"></script>

  <!-- Pyodide — runs Python in the browser via WebAssembly -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

  <script>
    const outputEl   = document.getElementById('output');
    const inputEl    = document.getElementById('cmd-input');
    const titleLabel = document.getElementById('titlebar-label');
    const promptEl   = document.getElementById('prompt-label');
    const MAX_LINES  = 100;

    let lines          = [];
    let pyodide        = null;
    let engineReady    = false;  // true once Pyodide + boot.py are loaded
    let gameManifests  = {};     // { gameName: { title, tagline, copyright?, release?, engine? } }

    // "shell" — waiting for a game command from boot.py
    // "game"  — a game module is active; commands go to send_cmd()
    let mode = 'shell';

    /* ── Tag color parser ──────────────────────────────────────────── */

    const TAG_COLORS = {
      white:  '#eee',
      red:    '#e00',
      green:  '#0d0',
      yellow: '#fc3',
      purple: '#A09',
      orange: '#d70',
      blue:   '#08f',
      dim:    '#888',
      bold:   null,
    };

    function parseTags(text) {
      text = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      Object.entries(TAG_COLORS).forEach(([tag, color]) => {
        const open  = new RegExp(`&lt;${tag}&gt;`, 'g');
        const close = new RegExp(`&lt;/${tag}&gt;`, 'g');
        const style = tag === 'bold'
          ? 'font-weight:bold'
          : `color:${color}`;
        text = text.replace(open,  `<span style="${style}">`);
        text = text.replace(close, `</span>`);
      });

      return text;
    }

    /* ── Rendering ─────────────────────────────────────────────────── */

    function renderLines() {
      outputEl.innerHTML = '';
      lines.slice(-MAX_LINES).forEach(l => {
        const span = document.createElement('span');
        span.className = 'line' + (l.cls ? ' ' + l.cls : '');
        span.innerHTML = parseTags(l.text);
        outputEl.appendChild(span);
      });
      outputEl.scrollTop = outputEl.scrollHeight;
    }

    function addLine(text, cls, lineObj) {
      lines.push(lineObj || { text: text ?? '', cls: cls ?? '' });
      if (lines.length > MAX_LINES) lines = lines.slice(-MAX_LINES);
    }

    async function printSlow(text, delayMs = 350) {
      for (const line of String(text).split('\n')) {
        addLine(line === '' ? ' ' : line);
        renderLines();
        await new Promise(r => setTimeout(r, delayMs));
      }
    }

    /* ── Module loader ─────────────────────────────────────────────── */

    async function loadPythonModule(path) {
      const src = await fetch(path).then(r => r.text());
      await pyodide.runPythonAsync(src);
    }

    /* ── Phase 1: boot ─────────────────────────────────────────────── */

    async function boot() {
      inputEl.disabled = true;

      // Start Pyodide download immediately in the background
      const pyodidePromise = loadPyodide();

      // OS header
      await printSlow([
        'Microsoft Windows [Version 10.0.22631.6199]',
        '(c) Microsoft Corporation. All rights reserved.',
        '',
        'B:\\Prg>TBTG',
        '',
        'TBTG v0.1 [MSC v.1938 64 bit (AMD64)] on win32',
        'Copyleft (c) by TBTG Group. No rights reserved.',
        'Release 42 / Serial number 210690',
        'Type <red>"help"</red> for more information.',
      ].join('\n'));

      addLine('Loading Python engine...', 'dim');
      renderLines();

      try {
        pyodide = await pyodidePromise;

        // Load shared engine modules
        await loadPythonModule('./cmd_interface.py');
        await loadPythonModule('./engine.py');

        // Build GAMES from per-game manifests and inject before boot.py loads
        const gameNames = await fetch('./games.json').then(r => r.json());
        gameManifests = {};
        for (const name of gameNames) {
          const res = await fetch(`./${name}/manifest.json`);
          if (!res.ok) continue;
          gameManifests[name] = await res.json();
        }
        pyodide.globals.set('GAMES', pyodide.toPy(gameManifests));

        // Load the boot shell
        await loadPythonModule('./boot.py');

        engineReady = true;

        const loadingLine = lines.findLast(l => l.text === 'Loading Python engine...');
        if (loadingLine) loadingLine.text = 'Python engine ready.';

      } catch (err) {
        const loadingLine = lines.findLast(l => l.text === 'Loading Python engine...');
        if (loadingLine) {
          loadingLine.text = 'Engine failed to load: ' + err.message;
          loadingLine.cls  = 'err';
        }
        renderLines();
        return; // don't enable input if boot failed
      }

      addLine('');
      renderLines();

      promptEl.textContent = 'TBTG>';
      inputEl.disabled = false;
      inputEl.focus();
    }

    /* ── Phase 2: launch a game dynamically ───────────────────────── */

    async function launchGame(gameName) {
      addLine('');
      addLine(`Launching <green>${gameName}</green>...`, 'dim');
      renderLines();

      try {
        const jsonPath   = `./${gameName}/${gameName}.json`;
        const modulePath = `./${gameName}/${gameName}.py`;

        // Pre-fetch both files before starting the loading bar so a missing
        // game (404) reports cleanly without a stranded animation.
        const [jsonRes, modRes] = await Promise.all([fetch(jsonPath), fetch(modulePath)]);
        if (!jsonRes.ok) throw new Error(`Could not fetch ${jsonPath}`);
        if (!modRes.ok)  throw new Error(`Could not fetch ${modulePath}`);
        const data      = await jsonRes.json();
        const moduleSrc = await modRes.text();

        // Both files validated — inject GAME_DATA and run the bar concurrently
        // with the Python module execution.
        pyodide.globals.set('GAME_DATA', pyodide.toPy(data));
        await Promise.all([
          runLoadingBar(addLine, renderLines),
          pyodide.runPythonAsync(moduleSrc),
        ]);

        // Switch mode so all further input goes to the game
        mode = 'game';
        titleLabel.textContent = `${gameName}.exe`;
        promptEl.textContent = `${gameName.toUpperCase()}>`;

        // Print manifest header — skip fields the manifest doesn't define
        const m = gameManifests[gameName] || {};
        const headerLines = [
          '',
          m.title,
          m.tagline,
          m.copyright,
          m.release,
          m.engine,
          '',
          '',
        ].filter(line => line !== undefined);
        await printSlow(headerLines.join('\n'));

        // Run the game intro
        const intro = await pyodide.runPythonAsync('intro()');
        await printSlow(intro, 350);

      } catch (err) {
        addLine(`Failed to launch ${gameName}: ` + err.message, 'err');
        renderLines();
      }

      inputEl.disabled = false;
      inputEl.focus();
    }

    /* ── Command dispatch ──────────────────────────────────────────── */

    async function handleCommand(raw) {
      const cmd = raw.trim();
      addLine(promptEl.textContent + ' ' + cmd, 'cmd');

      if (!cmd) { renderLines(); return; }

      if (!engineReady) {
        addLine('Engine is still loading, please wait...', 'err');
        renderLines();
        return;
      }

      // ── Game mode: forward everything to the active game module ───
      if (mode === 'game') {
        try {
          pyodide.globals.set('_cmd_input', cmd);
          const result = await pyodide.runPythonAsync('send_cmd(_cmd_input)');

          if (result === '__RESET__') {
            location.reload();
            return;
          }

          if (result === '__EXIT__') {
            // Re-load boot.py to restore boot-shell globals (send_cmd, handler, boot_sequence)
            // that the game module shadowed when it was loaded.
            await loadPythonModule('./boot.py');
            mode = 'shell';
            titleLabel.textContent = 'TBTG';
            promptEl.textContent = 'TBTG>';
            addLine('');
            renderLines();
            return;
          }

          await printSlow(String(result), 350);

        } catch (err) {
          addLine('Engine error: ' + err.message, 'err');
          renderLines();
        }
        return;
      }

      // ── Shell mode: route through boot.py ─────────────────────────
      try {
        pyodide.globals.set('_cmd_input', cmd);
        const result = await pyodide.runPythonAsync('send_cmd(_cmd_input)');

        // Check for launch signal
        if (String(result).startsWith('__LAUNCH__:')) {
          const gameName = String(result).split(':')[1];
          inputEl.disabled = true;
          await launchGame(gameName);
          return;
        }

        if (result) await printSlow(String(result), 200);

      } catch (err) {
        addLine('Shell error: ' + err.message, 'err');
        renderLines();
      }
    }

    /* ── Input listener ────────────────────────────────────────────── */

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const val = inputEl.value;
        inputEl.value = '';
        handleCommand(val);
      }
    });

    boot();
  </script>
</body>
</html>
